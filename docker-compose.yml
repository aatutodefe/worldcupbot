services:
  bot:
    build: .                     # Собирает образ из Dockerfile в текущей папке
    container_name: my_tg_bot    # Имя контейнера для удобства
    restart: always              # Автоматический перезапуск при падении или перезагрузке сервера
    env_file:
      - .env                     # Подгружает переменные из файла .env
    # volumes:                   # Раскомментируйте, если бот сохраняет файлы (фото, документы)
    #   - ./bot_data:/app/data   # Синхронизирует папку на сервере с папкой в контейнере